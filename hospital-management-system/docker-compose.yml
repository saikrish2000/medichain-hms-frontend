version: '3.9'

# =============================================
# MediChain HMS — Docker Compose (Local Dev)
# Run: docker-compose up -d
# =============================================

services:

  # ── MySQL Database ─────────────────────────
  db:
    image: mysql:8.0
    container_name: medichain-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hospital_db
      MYSQL_USER: hospitaluser
      MYSQL_PASSWORD: hospitalpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot Application ────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medichain-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/hospital_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      DB_USERNAME: hospitaluser
      DB_PASSWORD: hospitalpass
      JWT_SECRET: your-256-bit-secret-key-for-production-change-this
      MAIL_USERNAME: your_gmail@gmail.com
      MAIL_PASSWORD: your_app_password
      TWILIO_ACCOUNT_SID: optional
      TWILIO_AUTH_TOKEN: optional
      TWILIO_PHONE: optional
      RAZORPAY_KEY_ID: optional
      RAZORPAY_KEY_SECRET: optional
      LOG_LEVEL: INFO
      THYMELEAF_CACHE: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs

  # ── Nginx Reverse Proxy (optional) ─────────
  nginx:
    image: nginx:alpine
    container_name: medichain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    profiles:
      - production

volumes:
  mysql_data:
  uploads_data:
  logs_data:
