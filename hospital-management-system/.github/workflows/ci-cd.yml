name: HMS Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: medichain_hms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for speed)
        run: mvn package -DskipTests -q
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: medichain_hms_test
          DB_USERNAME: root
          DB_PASSWORD: testpassword

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hospital-management-system
          path: target/*.jar
          retention-days: 5

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for Maven package)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Build Docker image
        run: docker build -t medichain-hms-backend:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag medichain-hms-backend:${{ github.sha }} medichain-hms-backend:latest
