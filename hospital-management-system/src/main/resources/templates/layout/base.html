<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE — HMS">HMS</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <th:block layout:fragment="head-extra"></th:block>
    <style>
        .app-layout { display: flex; min-height: 100vh; }
        .app-sidebar {
            width: 256px; background: #fff; border-right: 2.5px solid var(--clay-border);
            display: flex; flex-direction: column; position: fixed;
            top: 0; left: 0; bottom: 0; z-index: 50; overflow-y: auto;
        }
        .app-main { margin-left: 256px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
        .app-topbar {
            background: #fff; border-bottom: 2.5px solid var(--clay-border);
            padding: 0.85rem 2rem; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 40;
            box-shadow: 0 4px 12px rgba(108,99,255,0.06);
        }
        .app-content { flex: 1; padding: 2rem; background: var(--clay-bg); }
        .sidebar-brand {
            padding: 1.25rem 1.25rem 1rem; display: flex; align-items: center;
            gap: 0.6rem; border-bottom: 2px dashed var(--clay-border); margin-bottom: 0.75rem;
        }
        .brand-icon {
            width: 40px; height: 40px; background: var(--pastel-purple);
            border-radius: var(--radius-md); display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; border: 2px solid var(--clay-border);
        }
        .brand-name { font-size: 1.05rem; font-weight: 800; color: var(--clay-primary); }
        .brand-sub  { font-size: 0.65rem; color: var(--clay-text-muted); font-weight: 600; }
        .nav-section { padding: 0 0.75rem; margin-top: 0.5rem; }
        .nav-section-title {
            font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--clay-text-muted); padding: 0.5rem 0.5rem; margin-top: 0.3rem;
        }
        .nav-link {
            display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.75rem;
            border-radius: var(--radius-md); color: var(--clay-text-muted); font-weight: 600;
            font-size: 0.875rem; text-decoration: none; transition: all 0.2s; margin-bottom: 2px;
            position: relative;
        }
        .nav-link:hover, .nav-link.active {
            background: var(--pastel-purple); color: var(--clay-primary);
        }
        .nav-link .nav-icon { width: 20px; text-align: center; font-size: 0.95rem; }
        .nav-badge {
            margin-left: auto; background: var(--clay-danger); color: #fff;
            font-size: 0.65rem; font-weight: 800; padding: 0.15rem 0.5rem;
            border-radius: var(--radius-full);
        }
        .sidebar-footer {
            margin-top: auto; padding: 1rem 1.25rem;
            border-top: 2px dashed var(--clay-border);
        }
        .user-card {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem; background: var(--clay-bg); border-radius: var(--radius-md);
            border: 2px solid var(--clay-border);
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--clay-primary); display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: 800; font-size: 0.85rem;
            flex-shrink: 0;
        }
        .user-name  { font-size: 0.82rem; font-weight: 700; color: var(--clay-text); }
        .user-role  { font-size: 0.7rem; color: var(--clay-text-muted); font-weight: 600; }
        .topbar-title { font-size: 1rem; font-weight: 800; color: var(--clay-text); }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: var(--radius-md);
            background: var(--clay-bg); border: 2px solid var(--clay-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-size: 0.95rem;
            color: var(--clay-text-muted); transition: all 0.2s; text-decoration: none;
        }
        .icon-btn:hover { background: var(--pastel-purple); color: var(--clay-primary); border-color: var(--clay-primary); }
        .notif-dot {
            position: absolute; top: -3px; right: -3px; width: 16px; height: 16px;
            background: var(--clay-danger); border-radius: 50%; font-size: 0.6rem;
            color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800;
        }
        /* Flash messages */
        .flash-container { position: fixed; top: 80px; right: 24px; z-index: 999; width: 360px; }
        .flash-msg {
            padding: 1rem 1.25rem; border-radius: var(--radius-md); border: 2px solid;
            font-weight: 600; font-size: 0.875rem; display: flex; align-items: center;
            gap: 0.6rem; margin-bottom: 0.5rem; box-shadow: var(--shadow-card);
            animation: slideIn 0.3s ease;
        }
        .flash-success { background: var(--pastel-green);  border-color: var(--clay-success); color: #1A9E74; }
        .flash-error   { background: var(--pastel-pink);   border-color: var(--clay-danger);  color: #D63939; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<!-- Flash messages -->
<div class="flash-container">
    <div th:if="${success}" class="flash-msg flash-success">
        <i class="fa fa-circle-check"></i> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flash-msg flash-error">
        <i class="fa fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>
</div>

<div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="app-sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">🏥</div>
            <div>
                <div class="brand-name">MediChain</div>
                <div class="brand-sub">Hospital Management</div>
            </div>
        </div>

        <div class="nav-section" layout:fragment="sidebar-nav">
            <!-- Overridden per role -->
        </div>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name,0,1).toUpperCase()}">A</div>
                <div>
                    <div class="user-name" sec:authentication="principal.fullName">User</div>
                    <div class="user-role" sec:authentication="principal.role">ROLE</div>
                </div>
            </div>
            <a href="/logout" class="nav-link" style="margin-top:0.5rem; color:var(--clay-danger);">
                <span class="nav-icon"><i class="fa fa-right-from-bracket"></i></span> Logout
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="app-main">
        <div class="app-topbar">
            <div class="topbar-title" layout:fragment="topbar-title">Dashboard</div>
            <div class="topbar-actions">
                <a href="#" class="icon-btn">
                    <i class="fa fa-bell"></i>
                    <span class="notif-dot">3</span>
                </a>
                <a href="#" class="icon-btn"><i class="fa fa-magnifying-glass"></i></a>
                <a href="#" class="icon-btn"><i class="fa fa-gear"></i></a>
            </div>
        </div>

        <div class="app-content">
            <th:block layout:fragment="content"></th:block>
        </div>
    </div>
</div>

<script>
    // Auto-dismiss flash messages
    setTimeout(() => {
        document.querySelectorAll('.flash-msg').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 4000);

    // Active nav
    document.querySelectorAll('.nav-link').forEach(link => {
        if (link.href && window.location.pathname.startsWith(new URL(link.href).pathname) && link.href !== '/') {
            link.classList.add('active');
        }
    });
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
