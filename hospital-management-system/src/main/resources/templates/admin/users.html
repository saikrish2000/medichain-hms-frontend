<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>All Users</title></head>

<th:block layout:fragment="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a th:href="@{/admin/dashboard}" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <div class="nav-section-title">People</div>
    <a th:href="@{/admin/patients}" class="nav-link"><span class="nav-icon">🧑‍⚕️</span> Patients</a>
    <a th:href="@{/admin/users}"    class="nav-link active"><span class="nav-icon">👥</span> All Users</a>
    <div class="nav-section-title">Approvals</div>
    <a th:href="@{/admin/approvals/doctors}" class="nav-link"><span class="nav-icon">👨‍⚕️</span> Doctors</a>
    <a th:href="@{/admin/approvals/nurses}"  class="nav-link"><span class="nav-icon">👩‍⚕️</span> Nurses</a>
</th:block>
<th:block layout:fragment="topbar-title">All Users</th:block>

<th:block layout:fragment="content">
<style>
    .card { background:#fff; border-radius:var(--radius-lg); border:2.5px solid var(--clay-border); box-shadow:var(--shadow-card); overflow:hidden; }
    table { width:100%; border-collapse:separate; border-spacing:0; }
    thead th { background:var(--pastel-purple); color:var(--clay-primary); font-weight:800; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.4px; padding:0.7rem 1rem; }
    tbody tr:hover { background:var(--clay-bg); }
    tbody td { padding:0.75rem 1rem; border-bottom:1.5px solid var(--clay-border); font-size:0.875rem; font-weight:500; }
    .badge { display:inline-flex; align-items:center; padding:0.2rem 0.65rem; border-radius:var(--radius-full); font-size:0.68rem; font-weight:800; text-transform:uppercase; }
    .role-badge { background:var(--pastel-purple); color:var(--clay-primary); }
    .status-active   { background:var(--pastel-green); color:#1A9E74; }
    .status-inactive { background:var(--pastel-pink);  color:#D63939; }
    .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:800; color:#fff; flex-shrink:0; }
    .btn-xs { padding:0.28rem 0.7rem; border-radius:var(--radius-full); font-size:0.72rem; font-weight:700; cursor:pointer; border:none; font-family:'Nunito',sans-serif; }
    .pagination { display:flex; gap:0.4rem; margin-top:1.5rem; justify-content:center; }
    .page-btn { width:36px; height:36px; border-radius:var(--radius-md); border:2px solid var(--clay-border); background:var(--clay-bg); display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-weight:700; cursor:pointer; text-decoration:none; color:var(--clay-text-muted); }
    .page-btn.active, .page-btn:hover { background:var(--pastel-purple); color:var(--clay-primary); border-color:var(--clay-primary); }
</style>

<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
    <div>
        <h1 style="font-size:1.4rem; font-weight:800;">All Users 👥</h1>
        <p style="color:var(--clay-text-muted); font-size:0.875rem;">Manage all registered users across the platform.</p>
    </div>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>#</th><th>User</th><th>Email</th><th>Role</th>
                <th>Phone</th><th>Verified</th><th>Status</th><th>Joined</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user, stat : ${users}">
                <td style="color:var(--clay-text-muted);" th:text="${stat.index + 1}">1</td>
                <td>
                    <div style="display:flex; align-items:center; gap:0.6rem;">
                        <div class="avatar"
                             th:style="'background:' + (${user.role.name() == 'DOCTOR'} ? '#6C63FF' : (${user.role.name() == 'PATIENT'} ? '#48CAE4' : '#FF6584')) + ';'"
                             th:text="${#strings.substring(user.firstName,0,1)}">U</div>
                        <div>
                            <div style="font-weight:700;" th:text="${user.fullName}">Name</div>
                            <div style="font-size:0.72rem; color:var(--clay-text-muted);" th:text="'@' + ${user.username}">@user</div>
                        </div>
                    </div>
                </td>
                <td th:text="${user.email}">email</td>
                <td><span class="badge role-badge" th:text="${user.role}">ROLE</span></td>
                <td th:text="${user.phone ?: '—'}">—</td>
                <td>
                    <span th:if="${user.emailVerified}" style="color:var(--clay-success); font-size:0.9rem;">✓</span>
                    <span th:unless="${user.emailVerified}" style="color:var(--clay-danger); font-size:0.9rem;">✗</span>
                </td>
                <td>
                    <span class="badge" th:classappend="${user.isActive} ? 'status-active' : 'status-inactive'"
                          th:text="${user.isActive} ? 'Active' : 'Inactive'">—</span>
                </td>
                <td style="color:var(--clay-text-muted); font-size:0.8rem;"
                    th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">—</td>
                <td>
                    <form th:action="@{'/admin/users/' + ${user.id} + '/toggle'}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-xs"
                                th:style="${user.isActive} ? 'background:var(--pastel-pink);color:#D63939;' : 'background:var(--pastel-green);color:#1A9E74;'"
                                th:text="${user.isActive} ? 'Deactivate' : 'Activate'">Toggle</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div class="pagination" th:if="${users.totalPages > 1}">
    <a th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
       th:href="@{/admin/users(page=${i})}"
       class="page-btn"
       th:classappend="${i == users.number} ? 'active'"
       th:text="${i + 1}">1</a>
</div>
</th:block>
</html>
