<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Hospital Branches</title></head>

<th:block layout:fragment="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a th:href="@{/admin/dashboard}"   class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <a th:href="@{/admin/branches}"    class="nav-link active"><span class="nav-icon">🏥</span> Branches</a>
    <a th:href="@{/admin/departments}" class="nav-link"><span class="nav-icon">🏢</span> Departments</a>
    <div class="nav-section-title">Approvals</div>
    <a th:href="@{/admin/approvals/doctors}" class="nav-link"><span class="nav-icon">👨‍⚕️</span> Doctors</a>
    <a th:href="@{/admin/approvals/nurses}"  class="nav-link"><span class="nav-icon">👩‍⚕️</span> Nurses</a>
</th:block>
<th:block layout:fragment="topbar-title">Hospital Branches</th:block>

<th:block layout:fragment="content">
<style>
    .branch-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1.25rem; }
    .branch-card {
        background:#fff; border-radius:var(--radius-lg); border:2.5px solid var(--clay-border);
        box-shadow:var(--shadow-card); padding:1.25rem; transition:transform 0.2s;
    }
    .branch-card:hover { transform:translateY(-3px); }
    .branch-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
    .branch-icon { width:44px; height:44px; background:var(--pastel-purple); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:1.2rem; border:2px solid var(--clay-border); }
    .branch-name { font-weight:800; font-size:1rem; }
    .branch-code { font-size:0.72rem; color:var(--clay-text-muted); font-weight:700; }
    .info-row { display:flex; align-items:flex-start; gap:0.5rem; font-size:0.82rem; color:var(--clay-text-muted); margin-bottom:0.35rem; font-weight:600; }
    .badge { display:inline-flex; align-items:center; padding:0.2rem 0.65rem; border-radius:var(--radius-full); font-size:0.68rem; font-weight:800; text-transform:uppercase; }
    .badge-active { background:var(--pastel-green); color:#1A9E74; }
    .card { background:#fff; border-radius:var(--radius-lg); border:2.5px solid var(--clay-border); box-shadow:var(--shadow-card); }
    .card-header { padding:1rem 1.25rem; border-bottom:2px solid var(--clay-border); display:flex; align-items:center; justify-content:space-between; }
    .card-title  { font-size:0.9rem; font-weight:800; }
</style>

<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
    <div>
        <h1 style="font-size:1.4rem; font-weight:800;">Hospital Branches 🏥</h1>
        <p style="color:var(--clay-text-muted); font-size:0.875rem;">Manage your hospital chain branches across cities.</p>
    </div>
    <button onclick="document.getElementById('addBranchModal').classList.add('open')"
            class="clay-btn clay-btn-primary">
        <i class="fa fa-plus"></i> Add Branch
    </button>
</div>

<!-- Branch Cards -->
<div class="branch-grid" style="margin-bottom:2rem;">
    <div th:each="branch : ${branches}" class="branch-card">
        <div class="branch-header">
            <div class="branch-icon">🏥</div>
            <div>
                <div class="branch-name" th:text="${branch.name}">Branch Name</div>
                <div class="branch-code" th:text="'Code: ' + ${branch.code}">Code</div>
            </div>
            <span class="badge badge-active" style="margin-left:auto;" th:if="${branch.isActive}">Active</span>
        </div>
        <div class="info-row">
            <i class="fa fa-location-dot" style="width:16px; color:var(--clay-primary);"></i>
            <span th:text="${branch.address + ', ' + branch.city + ', ' + branch.state}">Address</span>
        </div>
        <div class="info-row">
            <i class="fa fa-phone" style="width:16px; color:var(--clay-primary);"></i>
            <span th:text="${branch.phone}">Phone</span>
        </div>
        <div class="info-row" th:if="${branch.email}">
            <i class="fa fa-envelope" style="width:16px; color:var(--clay-primary);"></i>
            <span th:text="${branch.email}">Email</span>
        </div>
    </div>
    <div th:if="${branches.isEmpty()}" style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--clay-text-muted);">
        No branches yet. Add the first branch!
    </div>
</div>

<!-- Add Branch Modal -->
<div class="modal-overlay" id="addBranchModal">
    <div class="modal-box" style="max-width:560px;">
        <div style="font-size:1.1rem; font-weight:800; margin-bottom:1.25rem;">🏥 Add New Branch</div>
        <form th:action="@{/admin/branches/create}" th:object="${newBranch}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="clay-label">Branch Name</label>
                    <input type="text" th:field="*{name}" class="clay-input" placeholder="e.g. MediChain Hyderabad" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Branch Code</label>
                    <input type="text" th:field="*{code}" class="clay-input" placeholder="e.g. HYD01" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="clay-input" placeholder="0402345678" required/>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="clay-label">Address</label>
                    <textarea th:field="*{address}" class="clay-input" rows="2" placeholder="Full address" required style="resize:none;"></textarea>
                </div>
                <div class="form-group">
                    <label class="clay-label">City</label>
                    <input type="text" th:field="*{city}" class="clay-input" placeholder="City" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">State</label>
                    <input type="text" th:field="*{state}" class="clay-input" placeholder="State" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Pincode</label>
                    <input type="text" th:field="*{pincode}" class="clay-input" placeholder="500001" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Email (optional)</label>
                    <input type="email" th:field="*{email}" class="clay-input" placeholder="branch@hospital.com"/>
                </div>
            </div>
            <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                <button type="button" class="clay-btn clay-btn-secondary" style="flex:1; justify-content:center;"
                        onclick="document.getElementById('addBranchModal').classList.remove('open')">Cancel</button>
                <button type="submit" class="clay-btn clay-btn-primary" style="flex:2; justify-content:center;">
                    <i class="fa fa-plus"></i> Create Branch
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:var(--radius-xl); border:2.5px solid var(--clay-border); box-shadow:12px 12px 0px #D0CEFF; padding:2rem; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; }
</style>
</th:block>
<th:block layout:fragment="scripts">
<script>
    document.querySelectorAll('.modal-overlay').forEach(m => {
        m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
    });
</script>
</th:block>
</html>
