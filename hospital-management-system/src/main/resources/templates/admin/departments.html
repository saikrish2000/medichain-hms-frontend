<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Departments</title></head>

<th:block layout:fragment="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a th:href="@{/admin/dashboard}"     class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <a th:href="@{/admin/branches}"      class="nav-link"><span class="nav-icon">🏥</span> Branches</a>
    <a th:href="@{/admin/departments}"   class="nav-link active"><span class="nav-icon">🏢</span> Departments</a>
    <a th:href="@{/admin/specializations}" class="nav-link"><span class="nav-icon">🩺</span> Specializations</a>
    <div class="nav-section-title">Approvals</div>
    <a th:href="@{/admin/approvals/doctors}" class="nav-link"><span class="nav-icon">👨‍⚕️</span> Doctors</a>
    <a th:href="@{/admin/approvals/nurses}"  class="nav-link"><span class="nav-icon">👩‍⚕️</span> Nurses</a>
</th:block>
<th:block layout:fragment="topbar-title">Departments</th:block>

<th:block layout:fragment="content">
<style>
    .two-col { display:grid; grid-template-columns:1fr 360px; gap:1.5rem; align-items:start; }
    .card { background:#fff; border-radius:var(--radius-lg); border:2.5px solid var(--clay-border); box-shadow:var(--shadow-card); overflow:hidden; }
    .card-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:2px solid var(--clay-border); }
    .card-title  { font-size:0.9rem; font-weight:800; }
    table { width:100%; border-collapse:separate; border-spacing:0; }
    thead th { background:var(--pastel-purple); color:var(--clay-primary); font-weight:800; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.4px; padding:0.7rem 1rem; }
    tbody tr:hover { background:var(--clay-bg); }
    tbody td { padding:0.8rem 1rem; border-bottom:1.5px solid var(--clay-border); font-size:0.875rem; font-weight:500; }
    .badge { display:inline-flex; align-items:center; padding:0.2rem 0.65rem; border-radius:var(--radius-full); font-size:0.68rem; font-weight:800; text-transform:uppercase; }
    .badge-active   { background:var(--pastel-green);  color:#1A9E74; }
    .badge-inactive { background:var(--pastel-pink);   color:#D63939; }
    .btn-xs { padding:0.28rem 0.7rem; border-radius:var(--radius-full); font-size:0.72rem; font-weight:700; cursor:pointer; border:none; font-family:'Nunito',sans-serif; }
</style>

<div style="margin-bottom:1.5rem;">
    <h1 style="font-size:1.4rem; font-weight:800;">Departments 🏢</h1>
    <p style="color:var(--clay-text-muted); font-size:0.875rem;">Manage hospital departments across all branches.</p>
</div>

<div class="two-col">
    <!-- Department List -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">All Departments</div>
            <span style="font-size:0.78rem; color:var(--clay-text-muted);"
                  th:text="${departments.size()} + ' total'">0 total</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Name</th><th>Code</th><th>Branch</th><th>Floor</th><th>Status</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dept : ${departments}">
                    <td style="font-weight:700;" th:text="${dept.name}">—</td>
                    <td><code style="background:var(--clay-bg); padding:0.15rem 0.5rem; border-radius:6px; font-size:0.8rem;" th:text="${dept.code}">—</code></td>
                    <td th:text="${dept.branch.name}">—</td>
                    <td th:text="${dept.floorNumber ?: '—'}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="${dept.isActive} ? 'badge-active' : 'badge-inactive'"
                              th:text="${dept.isActive} ? 'Active' : 'Inactive'">—</span>
                    </td>
                    <td>
                        <form th:action="@{'/admin/departments/' + ${dept.id} + '/toggle'}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-xs"
                                    th:style="${dept.isActive} ? 'background:var(--pastel-pink);color:#D63939;' : 'background:var(--pastel-green);color:#1A9E74;'"
                                    th:text="${dept.isActive} ? 'Disable' : 'Enable'">Toggle</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${departments.isEmpty()}">
                    <td colspan="6" style="text-align:center; padding:2rem; color:var(--clay-text-muted);">No departments yet.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add Department Form -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">➕ Add Department</div>
        </div>
        <div style="padding:1.25rem;">
            <form th:action="@{/admin/departments/create}" th:object="${newDept}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label class="clay-label">Branch</label>
                    <select name="branchId" class="clay-input clay-select" required>
                        <option value="">Select branch</option>
                        <option th:each="branch : ${branches}"
                                th:value="${branch.id}"
                                th:text="${branch.name}">Branch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="clay-label">Department Name</label>
                    <input type="text" th:field="*{name}" class="clay-input" placeholder="e.g. Cardiology" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Department Code</label>
                    <input type="text" th:field="*{code}" class="clay-input" placeholder="e.g. CARD" required/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Floor Number</label>
                    <input type="text" th:field="*{floorNumber}" class="clay-input" placeholder="e.g. 2nd Floor"/>
                </div>
                <div class="form-group">
                    <label class="clay-label">Description</label>
                    <textarea th:field="*{description}" class="clay-input" rows="3"
                              placeholder="Brief description..." style="resize:vertical;"></textarea>
                </div>
                <button type="submit" class="clay-btn clay-btn-primary clay-btn-block">
                    <i class="fa fa-plus"></i> Create Department
                </button>
            </form>
        </div>
    </div>
</div>
</th:block>
</html>
