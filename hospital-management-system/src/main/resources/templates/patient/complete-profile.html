<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Complete Your Profile</title></head>
<th:block layout:fragment="topbar-title">👤 Complete Your Profile</th:block>

<th:block layout:fragment="content">
<style>
  .form-card{max-width:700px;margin:0 auto;background:#fff;border-radius:var(--radius-xl);border:2.5px solid var(--clay-border);box-shadow:var(--shadow-card);overflow:hidden;}
  .form-banner{background:linear-gradient(135deg,#6C63FF,#9B5DE5);padding:2rem;color:#fff;}
  .form-body{padding:2rem;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .section-divider{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--clay-text-muted);margin:1.25rem 0 .75rem;padding-bottom:.4rem;border-bottom:2px dashed var(--clay-border);}
</style>

<div class="form-card">
  <div class="form-banner">
    <div style="font-size:2rem;">👤</div>
    <h1 style="font-size:1.35rem;font-weight:900;margin-top:.5rem;">Complete Your Patient Profile</h1>
    <p style="font-size:.85rem;opacity:.85;margin-top:.25rem;">This information helps doctors provide better care and enables emergency contact.</p>
  </div>

  <div class="form-body">
    <form th:action="@{/patient/profile/save}" method="post">

      <div class="section-divider">📍 Contact & Address</div>
      <div class="form-group">
        <label class="clay-label">Address</label>
        <textarea class="clay-input" name="address" rows="2" placeholder="House no., Street, Area"></textarea>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="clay-label">City</label>
          <input type="text" class="clay-input" name="city" placeholder="Hyderabad"/>
        </div>
        <div class="form-group">
          <label class="clay-label">State</label>
          <input type="text" class="clay-input" name="state" placeholder="Telangana"/>
        </div>
      </div>
      <div class="form-group">
        <label class="clay-label">Pincode</label>
        <input type="text" class="clay-input" name="pincode" placeholder="500033" style="max-width:160px;"/>
      </div>

      <div class="section-divider">🚨 Emergency Contact</div>
      <div class="grid-2">
        <div class="form-group">
          <label class="clay-label">Emergency Contact Name</label>
          <input type="text" class="clay-input" name="emergencyContactName" placeholder="Full name"/>
        </div>
        <div class="form-group">
          <label class="clay-label">Relation</label>
          <select class="clay-input clay-select" name="emergencyContactRelation">
            <option value="">— Select —</option>
            <option>Spouse</option><option>Parent</option><option>Child</option>
            <option>Sibling</option><option>Friend</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="clay-label">Emergency Contact Phone</label>
        <input type="tel" class="clay-input" name="emergencyContactPhone" placeholder="+91-9XXXXXXXXX" style="max-width:260px;"/>
      </div>

      <div class="section-divider">🏥 Medical History</div>
      <div class="form-group">
        <label class="clay-label">Known Allergies</label>
        <textarea class="clay-input" name="allergies" rows="2" placeholder="Penicillin, Sulfa drugs, peanuts... (leave blank if none)"></textarea>
      </div>
      <div class="form-group">
        <label class="clay-label">Chronic Conditions</label>
        <textarea class="clay-input" name="chronicConditions" rows="2" placeholder="Diabetes Type 2, Hypertension... (leave blank if none)"></textarea>
      </div>

      <div class="section-divider">🛡️ Insurance (optional)</div>
      <div class="grid-2">
        <div class="form-group">
          <label class="clay-label">Insurance Provider</label>
          <input type="text" class="clay-input" name="insuranceProvider" placeholder="Star Health, HDFC Ergo..."/>
        </div>
        <div class="form-group">
          <label class="clay-label">Policy Number</label>
          <input type="text" class="clay-input" name="insurancePolicyNumber" placeholder="Policy number"/>
        </div>
      </div>

      <button type="submit" class="clay-btn clay-btn-primary clay-btn-block" style="margin-top:1.5rem;">
        ✅ Complete Profile & Continue
      </button>
    </form>
  </div>
</div>
</th:block>
</html>
