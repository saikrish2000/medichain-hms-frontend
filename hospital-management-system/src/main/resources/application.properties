# === Server ===
server.port=8080
spring.application.name=HospitalManagementSystem

# === Database ===
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=Asia/Calcutta&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# === Flyway (disabled – using ddl-auto=update) ===
spring.flyway.enabled=false

# === JWT ===
app.jwt.secret=${JWT_SECRET:HMS2024SuperSecretKey@#$%1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijk}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# === Email (Gmail SMTP) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@hospital.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# === Frontend URL ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# === Async ===
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# === Actuator ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# === Logging ===
logging.level.com.hospital=INFO
logging.level.org.springframework.security=WARN
