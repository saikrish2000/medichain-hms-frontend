# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=Hospital Management System
server.port=8080

# ==========================================
# DATABASE CONFIG
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# FLYWAY (DB MIGRATIONS)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================================
# JWT CONFIG
# ==========================================
app.jwt.secret=YourSuperSecretJWTKeyThatIsAtLeast256BitsLongForHospitalManagementSystem2024
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=uploads/
app.upload.allowed-types=pdf,jpg,jpeg,png

# ==========================================
# EMAIL (SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_hospital_email@gmail.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@yourhospital.com

# ==========================================
# TWILIO SMS (FREE TRIAL)
# ==========================================
twilio.account.sid=your_twilio_account_sid
twilio.auth.token=your_twilio_auth_token
twilio.phone.number=+1XXXXXXXXXX

# ==========================================
# RAZORPAY
# ==========================================
razorpay.key.id=your_razorpay_key_id
razorpay.key.secret=your_razorpay_key_secret
razorpay.currency=INR

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==========================================
# WEBSOCKET (GPS Tracking)
# ==========================================
app.websocket.allowed-origins=*

# ==========================================
# MULTILINGUAL (i18n)
# ==========================================
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.locale=en
spring.web.locale-resolver=accept-header

# ==========================================
# LOGGING
# ==========================================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/hospital-app.log

# ==========================================
# SESSION / SECURITY
# ==========================================
server.servlet.session.timeout=30m
server.error.whitelabel.enabled=false

# ==========================================
# ACTUATOR (for monitoring)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
