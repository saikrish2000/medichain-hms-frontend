# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=Hospital Management System
server.port=${PORT:8080}

# ==========================================
# DATABASE CONFIG — override via env vars
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==========================================
# FLYWAY (DB MIGRATIONS)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================================
# JWT CONFIG
# ==========================================
app.jwt.secret=${JWT_SECRET:YourSuperSecretJWTKeyThatIsAtLeast256BitsLongForHospitalManagementSystem2024}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=${UPLOAD_DIR:uploads/}
app.upload.allowed-types=pdf,jpg,jpeg,png

# ==========================================
# EMAIL (SMTP)
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@yourhospital.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@yourhospital.com}

# ==========================================
# TWILIO SMS
# ==========================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE:}

# ==========================================
# RAZORPAY
# ==========================================
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.currency=INR

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==========================================
# WEBSOCKET
# ==========================================
app.websocket.allowed-origins=${CORS_ORIGINS:*}

# ==========================================
# MULTILINGUAL (i18n)
# ==========================================
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.locale=en
spring.web.locale-resolver=accept-header

# ==========================================
# LOGGING
# ==========================================
logging.level.com.hospital=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.file.name=${LOG_FILE:logs/hospital-app.log}

# ==========================================
# SESSION / SECURITY
# ==========================================
server.servlet.session.timeout=30m
server.error.whitelabel.enabled=false

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
